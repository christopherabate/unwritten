<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./assets/styles/styles.css">
    <title>unwritten_</title>
  </head>
  <body>
    <main id="screen">
      <div id="title" class="turn-on">
        <h1>unwritten</h1>

        <ul class="unstyled">
          <li><button type="button" class="primary" disabled><span aria-hidden="true" class="icon interactive arrow-right"></span>Continue<span aria-hidden="true" class="icon interactive arrow-left"></span></button></li>
          <li><button type="button" class="primary" data-action="shutter:turn-off"><span aria-hidden="true" class="icon interactive arrow-right"></span>New game<span aria-hidden="true" class="icon interactive arrow-left"></span></button></li>
        </ul>

        <ul class="toolbar">
          <li><button type="button" class="link light" data-action="dialog:settings">Settings</button></li>
          <li><button type="button" class="link light" data-action="dialog:credits">Credits</button></li>
          <li><button type="button" class="transparent" data-action="standby|fullscreen"><span aria-hidden="true" class="icon maximize"></span>Fullscreen</button></li>
        </ul>

        <dialog id="settings">
          <h2>Settings</h2>
          <form method="dialog">
            <fieldset>
              <legend>Shader overlay?</legend>
              <label><input data-action="shader" class="tick" type="radio" name="shader" value="1"> Yes</label>
              <label><input data-action="shader" class="cross" type="radio" name="shader" value="0"> No</label>
            </fieldset>
            <fieldset>
              <legend>Glitch effects?</legend>
              <label><input data-action="glitch" class="tick" type="radio" name="glitch" value="1"> Yes</label>
              <label><input data-action="glitch" class="cross" type="radio" name="glitch" value="0"> No</label>
            </fieldset>
            <fieldset>
              <legend>test</legend>
              <label><input data-action="shader" class="" type="checkbox" name="shader"> Shader?</label>
            </fieldset>
            <button data-action="shutter:turn-off|shutter:turn-on" type="submit" class="light block"><span aria-hidden="true" class="icon cross"></span>Close</button>
          </form>
        </dialog>

        <dialog id="credits">
          <h2>Credits</h2>
          <p>Pixel-handcrafted by <a href="#">@christopherabate</a></p>
          <p>WCAG 2.2 AA compliant.</p>
          <form method="dialog">
            <button data-action="shutter:turn-off|shutter:turn-on" type="submit" class="light block"><span aria-hidden="true" class="icon cross"></span>Close</button>
          </form>
        </dialog>
      </div>
    </main>
    <script src="./assets/js/scripts.js"></script>
  </body>
</html>
