<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./assets/styles/styles.css">
    <title>unwritten_</title>
  </head>
  <body>
    <main class="aberration">
      <section id="shelves" class="turn-on">
        <h1>unwritten</h1>
        <button type="button" onclick="this.closest('section').classList.remove('turn-on', 'turn-off'); this.closest('section').classList.add('turn-on')">turn-on</button>
        <button type="button" onclick="this.closest('section').classList.remove('turn-on', 'turn-off'); this.closest('section').classList.add('turn-off')">turn-off</button>
        <button type="button" onclick="this.closest('section').classList.remove('turn-on', 'turn-off'); this.closest('section').classList.toggle('stand-by')">stand-by</button>
        <button type="button" disabled>disabled</button>
        <button type="button" onclick="document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen()">⛶</button>
        <button type="button" onclick="this.closest('section').classList.toggle('selected')">select</button>
        <form>
          <fieldset>
            <legend>Legend</legend>
            <div>
              <label for="input">Example input</label>
              <input type="text" id="input" placeholder="Example input">
            </div>
            <div>
              <label>
                <input type="radio" name="optionsRadios" id="optionsRadios1" value="option1" checked="">
                One
              </label>
              <label>
                <input type="radio" name="optionsRadios" id="optionsRadios2" value="option2">
                Two
              </label>
              <label>
                <input type="radio" name="optionsRadios" id="optionsRadios3" value="option3" disabled="">
                Three
              </label>
            </div>
          </fieldset>
          <fieldset>
            <legend>Legend</legend>

              <label for="input">Example input</label>
              <input type="text" id="input" placeholder="Example input">
            </div>
