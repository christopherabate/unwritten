<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./assets/styles/styles.css">
    <title>unwritten_</title>
  </head>
  <body>
    <main class="screen">
      <div id="title" class="shutter turn-on">
        <h1>unwritten</h1>
        <ul>
          <li><button type="button" class="primary" disabled><span aria-hidden="true" class="icon interactive arrow-right"></span>Continue</button></li>
          <li><button type="button" class="primary"><span aria-hidden="true" class="icon interactive arrow-right"></span>New game</button></li>
          <li><button type="button" class="light" data-action="dialog" data-target="settings"><span aria-hidden="true" class="icon interactive arrow-right"></span>Settings</button></li>
          <li><button type="button" class="light" data-action="dialog" data-target="credits"><span aria-hidden="true" class="icon interactive arrow-right"></span>Credits</button></li>
          <li><button type="button" class="secondary" data-action="fullscreen"><span aria-hidden="true" class="icon maximize"></span>Fullscreen</button></li>
        </ul>

        <dialog id="settings">
          <h2>Settings</h2>
          <form method="dialog">
            <fieldset>
              <legend>Shader overlay?</legend>
              <label><input data-action="shader" class="tick" type="radio" name="shader" value="1"> Yes</label>
              <label><input data-action="shader" class="cross" type="radio" name="shader" value="0"> No</label>
            </fieldset>
            <fieldset>
              <legend>Glitch effects?</legend>
              <label><input data-action="glitch" class="tick" type="radio" name="glitch" value="1"> Yes</label>
              <label><input data-action="glitch" class="cross" type="radio" name="glitch" value="0"> No</label>
            </fieldset>
            <button type="submit" class="light"><span aria-hidden="true" class="icon cross"></span>Close</button>
          </form>
        </dialog>

        <dialog id="credits">
          <h2>Credits</h2>
          <p>Pixel-handcrafted by <a href="#">@christopherabate</a></p>
          <p>WCAG 2.2 AA compliant.</p>
          <form method="dialog">
            <button type="submit" class="light"><span aria-hidden="true" class="icon cross"></span>Close</button>
          </form>
        </dialog>
      </div>
    </main>
    <script src="./assets/js/scripts.js"></script>
  </body>
</html>
